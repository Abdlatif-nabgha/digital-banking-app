spring:
  application:
    name: digital-banking
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: false
server:
  port: 8080
springdoc:
  swagger-ui:
    operations-sorter: method
  api-docs:
    path: /v3/api-docs